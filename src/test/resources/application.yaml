quarkus:
  index-dependency:
    tracking-service:
      group-id: org.jboss.pnc
      artifact-id: pnc-api
      classifier: jakarta
  arc:
    # to use the injected Mock instead
    exclude-types: org.jboss.pnc.quarkus.client.auth.runtime.PNCClientAuthImpl
  oidc:
    enabled: false
  oidc-client:
    enabled: false
  http:
    auth:
      basic: false
  security:
    ldap:
      enabled: false
  log:
    console:
      json:
        enabled: false
repository-driver:
  backend: artifactory # indy or artifactory
  deployment: prod # prod [pnc] / stage [pnc-stage] / devel [pnc-devel]
  http-client:
    connect-timeout: 1
    request-timeout: 3

    # Build Category Configuration
    build-categories:
      # Default category
      default:
        build-promotion-target: target
        temp-build-promotion-target: temporary-target
        build-group-constituents:
          temp-hosted:
            - constituent-temp-hosted
          temp-group:
            - constituent-temp-group
          hosted:
            - consituent-hosted
          group:
            - constituent-group

      # Standard category
      standard:
        build-group-constituents:
          temp-hosted:
            - temp-central
          temp-group: []
          hosted:
            - central

      # Service category
      service:
        build-promotion-target: service-builds
        temp-build-promotion-target: temporary-service-builds
        build-group-constituents:
          temp-hosted:
            - central
          temp-group: []
          hosted:
            - central
          group: []
  ignored-path-patterns:
    archive:
      maven: [ ".*/maven-metadata\\.xml(\\..+)?$" ]
    promotion:
      maven: [ ".*/maven-metadata\\.xml$", ".*\\.sha1$" ]
      npm:
      generic:
    result:
      maven:
      npm:
      generic:
  indy-sidecar:
    enabled: false
    url: http://sidecar:8093/
  ignored-repo-patterns:
    promotion: [ ".*ignored", ".+tobeigno.+" ]
#    promotion: [ "maven:.*:ignored", "maven:.+:tobeigno.+" ]
    archive: [ ".*-build-yyyyy", ".*-build-xxxxx" ]
#    archive: [ "maven:.*:build-yyyyy", "maven:hosted:build-xxxxx" ]
  self-base-url: "http://localhost:8081/"
  artifactory-client:
    url: "http://artifactory-host/api/"
    accessToken: "TOKEN"
  indy-client:
    api-url: "http://indy-host/api/"
  archive-service:
    enabled: true
    api-url: "http://archive-service/archive/"
  bifrost-uploader:
    api-url: "http://bifrost-host/"
  heartbeat:
    interval: 1
  tracking-service:
    api-url: http://localhost:8080
  download-target-repository: "{project}/{type}/{url}"
  # https://indy.corp.redhat.com/api/content/maven/hosted/pnc-builds/com/datastax/oss/native-protocol/1.5.1.redhat-00001/native-protocol-1.5.1.redhat-00001.pom
  uploads-target-repository: "{project}/{type}/{target}"

"%dev":
  quarkus:
    log:
      console:
        json: false
