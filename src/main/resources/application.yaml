quarkus:
  application:
    name: pnc-repository-driver
  index-dependency:
    tracking-service:
      group-id: org.jboss.pnc
      artifact-id: pnc-api
  rest-client:
    tracking-service:
      url: ${repository-driver.tracking-service.api-url:http://localhost:8080}
      scope: jakarta.inject.Singleton
  otel:
    enabled: true
    traces:
      enabled: true
    exporter:
      otlp:
        # Send telemetry data to an opentelemetry-collector
        #endpoint: http://localhost:4317
  http:
    auth:
      # required for LDAP: build-time property
      basic: true
    enable-compression: true
    enable-decompression: true
    cors:
      enabled: true
      origins: "/.*/"
  security:
    ldap:
      # enable LDAP: build-time property
      enabled: true
      cache:
        enabled: true
        max-age: 5m
      dir-context:
        url: ldaps://ldap-server.com
      identity-mapping:
        search-base-dn: ou=company.com

  shutdown:
    timeout: 300
  log:
    category:
      "org.jboss.pnc":
        level: DEBUG
    console:
      format: "%d{HH:mm:ss,SSS} %-5p traceId=%X{traceId}, parentId=%X{parentId}, spanId=%X{spanId}, sampled=%X{sampled} [%c{3.}] (%t) %s%e mdc:[%X]%n"
    handler:
      kafka:
        enabled: false
        broker-list: kafka.example.com:443
        topic: kafka-topic
        security-protocol: SSL
        ssl-truststore-location: /mnt/kafka-client-truststore.jks
        ssl-truststore-password: none
        filter-logger-name-pattern: org.jboss.pnc.*
        level: INFO
  oidc:
    auth-server-url: https://keycloak-host/auth/realms/myrealm
    client-id: client
    credentials:
      secret: secret
    tls:
      verification: none
  oidc-client:
    auth-server-url: http://localhost:8180/auth/realms/quarkus/
    client-id: my-app
    credentials:
      secret: secret

pnc_client_auth:
  type: OIDC # or LDAP
  # ldap_credentials:
  #    path: /mnt/secrets/ldap_credentials # file must be in format: <username>:<password>

repository-driver:
  backend: indy # indy or artifactory
  deployment: prod # prod [pnc] / stage [pnc-stage] / devel [pnc-devel]
  ignored-path-patterns:
    archive:
      maven:
    promotion:
      maven:
      npm:
      generic:
    result:
      maven:
      npm:
      generic:
  ignored-repo-patterns:
    promotion:
    archive:
  temp-build-promotion-target:
  build-promotion-target:
  self-base-url:
  artifactory-client:
    url:
    accessToken:
  indy-client:
    api-url:
    request-timeout: 30
  indy-sidecar:
    enabled: false
    url:
  http-client:
    connect-timeout: 5
    request-timeout: 15
  callback-retry-duration: 600
  callback-retry-delay-msec: 500
  callback-retry-max-delay-msec: 5000
  archive-service:
    enabled: true
    api-url:
    prefer-http-2: true
    running-wait-for: 60
    running-retry-delay-msec: 500
    running-retry-max-delay-msec: 5000
  heartbeat:
    interval: 30
  tracking-service:
    api-url: http://localhost:8080
